<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>대한민국의 지능, 세계의 진흥</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: #334155;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .deck { display: flex; justify-content: center; padding: 24px; }
  .slide {
    width: 1280px;
    height: 720px;
    background: radial-gradient(ellipse at 30% 20%, #1e40af 0%, #0b1120 55%, #020617 100%);
    color: #f8fafc;
    border-radius: 8px;
    box-shadow: 0 20px 50px rgba(0,0,0,.35);
    position: relative;
    overflow: hidden;
    padding: 80px 96px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .globe {
    position: absolute;
    right: -180px;
    top: 50%;
    transform: translateY(-50%);
    width: 720px;
    height: 720px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 35% 30%, rgba(103,232,249,.18) 0%, rgba(103,232,249,0) 55%),
      conic-gradient(from 210deg, rgba(59,130,246,.22), rgba(14,165,233,.08), rgba(59,130,246,.22));
    opacity: .8;
    filter: blur(0.3px);
  }
  .tag {
    display: inline-block;
    font-size: 13px;
    font-weight: 700;
    color: #67e8f9;
    letter-spacing: .3em;
    text-transform: uppercase;
    margin-bottom: 28px;
    position: relative;
  }
  .lead {
    font-size: 22px;
    color: #cbd5e1;
    line-height: 1.6;
    font-weight: 500;
    letter-spacing: -0.01em;
    margin-bottom: 36px;
    position: relative;
  }
  .lead strong { color: #fff; font-weight: 700; }
  .heritage {
    display: flex;
    gap: 14px;
    margin-bottom: 32px;
    position: relative;
  }
  .chip {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: .05em;
    color: #e0f2fe;
    background: rgba(14, 165, 233, .18);
    border: 1px solid rgba(103, 232, 249, .35);
    padding: 8px 16px;
    border-radius: 999px;
  }
  .chip.next {
    background: rgba(252, 211, 77, .12);
    border-color: rgba(252, 211, 77, .55);
    color: #fde68a;
  }
  .slogan {
    font-size: 92px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.04em;
    line-height: 1.08;
    position: relative;
  }
  .slogan .hl { color: #67e8f9; }
  .slogan .hl2 { color: #fcd34d; }
  .rule {
    width: 80px;
    height: 3px;
    background: #fcd34d;
    margin: 44px 0 28px;
    position: relative;
  }
  .closing {
    font-size: 20px;
    color: #e2e8f0;
    line-height: 1.6;
    font-weight: 500;
    position: relative;
  }
  .closing strong { color: #67e8f9; font-weight: 700; }
  .brand {
    position: absolute;
    left: 96px;
    bottom: 32px;
    font-size: 12px;
    color: #94a3b8;
    letter-spacing: .25em;
    font-weight: 600;
  }
  .slide-num {
    position: absolute;
    right: 40px;
    bottom: 32px;
    font-size: 13px;
    color: #94a3b8;
    letter-spacing: .15em;
    font-variant-numeric: tabular-nums;
  }
  @page { size: 1280px 720px; margin: 0; }
  @media print {
    html, body { background: #fff; }
    .deck { padding: 0; }
    .slide { box-shadow: none; border-radius: 0; }
  }
</style>
</head>
<body>
<div class="deck">
  <section class="slide">
    <div class="globe"></div>
    <div class="tag">KOREA · 한국산업부흥해라</div>
    <p class="lead">
      반도체가 그랬고, K-컬처가 그랬습니다.<br>
      <strong>다음은, 당신이 만든 지능입니다.</strong>
    </p>
    <div class="heritage">
      <span class="chip">반도체</span>
      <span class="chip">K-컬처</span>
      <span class="chip">K-방산</span>
      <span class="chip next">다음 · AI</span>
    </div>
    <div class="slogan">
      <span class="hl">대한민국</span>의 지능,<br>
      <span class="hl2">세계</span>의 진흥.
    </div>
    <div class="rule"></div>
    <p class="closing">
      우리가 만든 것은, <strong>언제나 세계의 기준</strong>이 되었습니다.
    </p>
    <div class="brand">MR. PARK · KOREA</div>
    <div class="slide-num">FIN</div>
  </section>
</div>
</body>
</html>
