<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>지능의 시대, 진흥의 대한민국</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: #334155;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .deck { display: flex; justify-content: center; padding: 24px; }
  .slide {
    width: 1280px;
    height: 720px;
    background: linear-gradient(135deg, #0b1120 0%, #1e3a8a 55%, #0ea5e9 130%);
    color: #f8fafc;
    border-radius: 8px;
    box-shadow: 0 20px 50px rgba(0,0,0,.35);
    position: relative;
    overflow: hidden;
    padding: 80px 96px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .tag {
    display: inline-block;
    font-size: 13px;
    font-weight: 700;
    color: #67e8f9;
    letter-spacing: .3em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  .lead {
    font-size: 22px;
    color: #cbd5e1;
    line-height: 1.6;
    font-weight: 500;
    letter-spacing: -0.01em;
    margin-bottom: 36px;
  }
  .lead strong { color: #fff; font-weight: 700; }
  .slogan {
    font-size: 92px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.04em;
    line-height: 1.08;
  }
  .slogan .hl { color: #fcd34d; }
  .rule {
    width: 80px;
    height: 3px;
    background: #67e8f9;
    margin: 44px 0 28px;
  }
  .closing {
    font-size: 20px;
    color: #e2e8f0;
    line-height: 1.6;
    font-weight: 500;
  }
  .closing strong { color: #fcd34d; font-weight: 700; }
  .brand {
    position: absolute;
    left: 96px;
    bottom: 32px;
    font-size: 12px;
    color: #94a3b8;
    letter-spacing: .25em;
    font-weight: 600;
  }
  .slide-num {
    position: absolute;
    right: 40px;
    bottom: 32px;
    font-size: 13px;
    color: #94a3b8;
    letter-spacing: .15em;
    font-variant-numeric: tabular-nums;
  }
  @page { size: 1280px 720px; margin: 0; }
  @media print {
    html, body { background: #fff; }
    .deck { padding: 0; }
    .slide { box-shadow: none; border-radius: 0; }
  }
</style>
</head>
<body>
<div class="deck">
  <section class="slide">
    <div class="tag">KOREA · 한국산업부흥해라</div>
    <p class="lead">
      변화는 두렵지 않습니다.<br>
      우리는 이미, <strong>가장 빠르게 배우는 국민</strong>입니다.
    </p>
    <div class="slogan">
      <span class="hl">지능</span>의 시대,<br>
      <span class="hl">진흥</span>의 대한민국.
    </div>
    <div class="rule"></div>
    <p class="closing">
      당신이 서 있는 그 자리가, <strong>대한민국의 미래</strong>입니다.
    </p>
    <div class="brand">MR. PARK · KOREA</div>
    <div class="slide-num">FIN</div>
  </section>
</div>
</body>
</html>
